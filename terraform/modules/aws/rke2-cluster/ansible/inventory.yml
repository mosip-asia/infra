---
all:
  vars:
    cluster_name: "demoinfra"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.3-rc.1"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.demo.mosip.net/v3/import/5kndjpzm9ns8q7tgnn92rj7bstz8nljbqpkktcvvctr8cdhb276b79_c-m-hcfst5ls.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        demoinfra-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.132
          node_role: control_plane
          is_primary: true
          node_index: 0
        demoinfra-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.3.250
          node_role: control_plane
          is_primary: false
          node_index: 1
        demoinfra-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.16
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        demoinfra-ETCD-NODE-1:
          ansible_host: 10.0.4.217
          node_role: etcd
        demoinfra-ETCD-NODE-2:
          ansible_host: 10.0.3.197
          node_role: etcd
        demoinfra-ETCD-NODE-3:
          ansible_host: 10.0.4.220
          node_role: etcd
    
    workers:
      hosts:
        demoinfra-WORKER-NODE-1:
          ansible_host: 10.0.4.106
          node_role: worker
        demoinfra-WORKER-NODE-2:
          ansible_host: 10.0.3.185
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
